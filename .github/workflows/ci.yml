name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & test backend ─────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run tests
        working-directory: backend
        run: npm test

  # ── Job 2: Build Docker images ─────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build \
            --tag ecommerce-backend:${{ github.sha }} \
            --tag ecommerce-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --tag ecommerce-frontend:${{ github.sha }} \
            --tag ecommerce-frontend:latest \
            --file ./frontend/dockerfile \
            ./frontend

  # ── Job 3: Integration test with docker compose ────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "POSTGRES_USER=admin"           >> .env
          echo "POSTGRES_PASSWORD=ci_password" >> .env
          echo "POSTGRES_DB=ecommerce"         >> .env
          echo "JWT_SECRET=ci_jwt_secret"      >> .env

      - name: Start all containers
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/health; then
              echo "✅ Backend healthy"
              break
            fi
            echo "Attempt $i — waiting..."
            sleep 5
          done

      - name: Run API health check
        run: curl -f http://localhost/api/health | python3 -m json.tool

      - name: Show container status
        run: docker compose ps

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Tear down
        if: always()
        run: docker compose down -v
